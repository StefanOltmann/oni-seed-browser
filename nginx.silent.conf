# This is a GDPR / privacy friendly configuration.

# Required NGINX events block.
# No event level logging or tuning is needed for this setup.
events {}

http {

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Disable access logging completely.
    # This prevents storage of IP addresses, request paths,
    # user agents, and timestamps.
    access_log off;

    # Log only critical errors to stderr.
    # Normal requests, warnings, and notices are not logged.
    # stderr is captured by Docker and visible in Portainer.
    error_log /dev/stderr crit;

    # Enable gzip compression for text-based assets and WASM files.
    gzip on;
    gzip_types application/wasm application/javascript text/css text/html application/json;
    gzip_min_length 256;
    gzip_vary on;

    server {

        # Listen on port 80 for HTTP traffic.
        listen 80;

        # Catch all hostnames.
        server_name _;

        # Serve static files from the container filesystem.
        root /usr/share/nginx/html;

        # Default document.
        index index.html;

        location ~* \.wasm$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Content-Type application/wasm;
        }

        location ~* \.(js|css)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /data/ {
            # The protobuf search index files are stored pre-gzipped.
            add_header Content-Encoding gzip always;
            default_type application/octet-stream;
        }

        location / {
            # Serve the requested file if it exists.
            # Fallback to index.html for client side routing.
            try_files $uri $uri/ /index.html;
        }
    }
}
