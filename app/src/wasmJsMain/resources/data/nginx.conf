# Include this in your server block:
#   include /path/to/data/nginx.conf;

location /data/ {
    add_header Access-Control-Allow-Origin "*";
    add_header X-Test "Nginx served this.";

    location ~* \.pb\.zst$ {
        add_header Access-Control-Allow-Origin "*";
        add_header Content-Type "application/protobuf";
        add_header Content-Encoding zstd;
    }
}
